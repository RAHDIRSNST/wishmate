<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Reminder - WishMate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="wm-navbar-container"></div>

<div class="container" style="padding-top: 110px; padding-bottom: 60px;">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="wm-card p-4 p-md-5 fade-in-up">
        <h3 id="formTitle" class="mb-1"><i class="bi bi-calendar-plus text-gradient me-2"></i>Add New Reminder</h3>
        <p class="text-muted mb-4">Fill in the details so WishMate never lets you forget.</p>

        <div id="reminder-alert" class="alert alert-danger d-none"></div>

        <form id="reminderForm" novalidate>
          <input type="hidden" id="reminderId">

          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Person's Name *</label>
              <input type="text" class="form-control" id="personName" placeholder="e.g. Kavya Reddy" required>
              <div class="invalid-feedback">Please enter the person's name.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Relationship *</label>
              <input type="text" class="form-control" id="relationship" placeholder="e.g. Sister, Friend, Colleague" required>
              <div class="invalid-feedback">Please enter the relationship.</div>
            </div>

            <div class="col-md-6">
              <label class="form-label">Occasion *</label>
              <select class="form-select" id="occasion" required>
                <option value="" selected disabled>Select occasion</option>
                <option value="Birthday">Birthday</option>
                <option value="Anniversary">Anniversary</option>
                <option value="Wedding Day">Wedding Day</option>
                <option value="Festival">Festival</option>
                <option value="Custom">Custom</option>
              </select>
              <div class="invalid-feedback">Please select an occasion.</div>
            </div>
            <div class="col-md-6 d-none" id="customOccasionWrapper">
              <label class="form-label">Custom Occasion Name</label>
              <input type="text" class="form-control" id="customOccasion" placeholder="e.g. Housewarming">
            </div>

            <div class="col-md-6">
              <label class="form-label">Date *</label>
              <input type="date" class="form-control" id="date" required>
              <div class="invalid-feedback">Please select a date.</div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Time</label>
              <input type="time" class="form-control" id="time" value="09:00">
            </div>

            <div class="col-md-6">
              <label class="form-label">Remind Me Before</label>
              <select class="form-select" id="reminderBefore">
                <option value="Same Day">Same Day</option>
                <option value="1 Day Before">1 Day Before</option>
                <option value="3 Days Before">3 Days Before</option>
                <option value="7 Days Before">7 Days Before</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Reminder Methods</label>
              <div class="d-flex flex-wrap gap-3 pt-2">
                <div class="form-check">
                  <input class="form-check-input reminder-method" type="checkbox" value="App" id="methodApp" checked>
                  <label class="form-check-label" for="methodApp">App</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input reminder-method" type="checkbox" value="WhatsApp Demo" id="methodWhatsapp">
                  <label class="form-check-label" for="methodWhatsapp">WhatsApp (Demo)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input reminder-method" type="checkbox" value="SMS Demo" id="methodSms">
                  <label class="form-check-label" for="methodSms">SMS (Demo)</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input reminder-method" type="checkbox" value="Call Demo" id="methodCall">
                  <label class="form-check-label" for="methodCall">Call (Demo)</label>
                </div>
              </div>
            </div>

            <div class="col-12">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="giftHelp">
                <label class="form-check-label" for="giftHelp">I'd like Gift Help for this occasion</label>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">Notes</label>
              <textarea class="form-control" id="notes" rows="3" placeholder="Any extra details..."></textarea>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-gradient px-4" id="saveReminderBtn">
              <span id="saveBtnText"><i class="bi bi-check-circle me-2"></i>Save Reminder</span>
              <span id="saveSpinner" class="spinner-border spinner-border-sm d-none"></span>
            </button>
            <a href="dashboard.html" class="btn btn-outline-secondary px-4 rounded-pill">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  protectPage();
  renderNavbar('add-reminder');
  initAddReminderPage();
</script>
</body>
</html>
