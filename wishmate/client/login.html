<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - WishMate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="auth-wrapper">
  <div class="col-lg-6 auth-image-side" style="background-image: url('https://images.unsplash.com/photo-1464349095431-e9a21285b5f3?auto=format&fit=crop&w=1200&q=80');">
    <div class="auth-image-overlay">
      <div class="text-white text-center">
        <i class="bi bi-gift-fill" style="font-size: 4rem;"></i>
        <h2 class="mt-3 fw-bold">Welcome Back to WishMate</h2>
        <p class="lead">Login to keep track of every special moment in your life.</p>
      </div>
    </div>
  </div>

  <div class="col-lg-6 auth-form-side">
    <div class="auth-form-card fade-in-up">
      <a href="index.html" class="text-decoration-none">
        <h3 class="text-gradient mb-1"><i class="bi bi-gift-fill me-1"></i>WishMate</h3>
      </a>
      <p class="text-muted mb-4">Login to your account to continue</p>

      <div id="login-alert" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          <div class="invalid-feedback">Please enter a valid email address.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required minlength="6">
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-gradient w-100 mt-2" id="loginBtn">
          <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-2"></i>Login</span>
          <span id="loginSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
      </form>

      <p class="text-center mt-4 small text-muted">Don't have an account? <a href="signup.html" class="text-gradient fw-semibold">Sign Up</a></p>
      <p class="text-center small"><a href="index.html" class="text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Home</a></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfLoggedIn();

  const loginForm = document.getElementById('loginForm');
  const loginAlert = document.getElementById('login-alert');
  const loginBtn = document.getElementById('loginBtn');
  const loginBtnText = document.getElementById('loginBtnText');
  const loginSpinner = document.getElementById('loginSpinner');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginAlert.classList.add('d-none');

    if (!loginForm.checkValidity()) {
      e.stopPropagation();
      loginForm.classList.add('was-validated');
      return;
    }

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    loginBtn.disabled = true;
    loginBtnText.classList.add('d-none');
    loginSpinner.classList.remove('d-none');

    try {
      const res = await AuthAPI.login({ email, password });
      setAuth(res.token, res.user);
      showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = res.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 800);
    } catch (error) {
      loginAlert.textContent = error.message;
      loginAlert.classList.remove('d-none');
    } finally {
      loginBtn.disabled = false;
      loginBtnText.classList.remove('d-none');
      loginSpinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
