<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wish Templates - WishMate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="wm-navbar-container"></div>

<div class="container" style="padding-top: 110px; padding-bottom: 60px;">

  <div class="mb-4">
    <h2 class="mb-1"><i class="bi bi-chat-heart-fill text-gradient me-2"></i>Wish Templates</h2>

  <ul class="nav nav-pills mb-4" id="templateTabs">
    <li class="nav-item">
      <button class="nav-link active" data-category="Birthday">Birthday</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-category="Anniversary">Anniversary</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-category="Wedding">Wedding</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-category="Festival">Festival</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" data-category="Custom">Custom</button>
    </li>
  </ul>

  <div id="templatesContainer" class="row g-4"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  protectPage();
  renderNavbar('wish-templates');
  initWishTemplatesPage();
