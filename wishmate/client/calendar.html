<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - WishMate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="wm-navbar-container"></div>

<div class="container" style="padding-top: 110px; padding-bottom: 60px;">

  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
    <h2 class="mb-0"><i class="bi bi-calendar3 text-gradient me-2"></i>Calendar</h2>
    <a href="add-reminder.html" class="btn btn-gradient"><i class="bi bi-plus-circle me-2"></i>Add Reminder</a>
  </div>

  <div class="wm-card p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <button class="btn btn-outline-gradient" id="prevMonthBtn"><i class="bi bi-chevron-left"></i></button>
      <h4 id="calendarMonthLabel" class="mb-0 font-heading"></h4>
      <button class="btn btn-outline-gradient" id="nextMonthBtn"><i class="bi bi-chevron-right"></i></button>
    </div>

    <div id="loadingSpinner" class="wm-spinner-wrapper">
      <div class="wm-spinner"></div>
    </div>

    <div id="calendarWrapper" class="d-none">
      <div class="calendar-grid mb-1">
        <div class="calendar-day-header">Sun</div>
        <div class="calendar-day-header">Mon</div>
        <div class="calendar-day-header">Tue</div>
        <div class="calendar-day-header">Wed</div>
        <div class="calendar-day-header">Thu</div>
        <div class="calendar-day-header">Fri</div>
        <div class="calendar-day-header">Sat</div>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
    </div>
  </div>

</div>

<!-- Day Detail Modal -->
<div class="modal fade" id="dayDetailModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-xl">
      <div class="modal-header border-0">
        <h5 class="modal-title" id="dayDetailTitle">Reminders</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pt-0" id="dayDetailBody"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
<script>
  protectPage();
  renderNavbar('calendar');
  initCalendarPage();
</script>
</body>
</html>
